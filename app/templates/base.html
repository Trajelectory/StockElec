<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}{{ app_name or 'StockElec' }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<nav class="navbar">
    <a class="nav-brand" href="{{ url_for('components.home') }}">
        <span class="nav-icon">⚡</span>
        {{ app_name or 'StockElec' }}
    </a>
    <div class="nav-links">
<a href="{{ url_for('components.stock') }}"
           class="nav-link {% if request.endpoint == 'components.stock' %}active{% endif %}">
            <span class="nav-emoji">📦</span> Stock
        </a>
        <a href="{{ url_for('projects.index') }}"
           class="nav-link {% if request.endpoint and request.endpoint.startswith('projects.') %}active{% endif %}">
            <span class="nav-emoji">🗂️</span> Projets
        </a>
        <a href="{{ url_for('components.history') }}"
           class="nav-link {% if request.endpoint == 'components.history' %}active{% endif %}">
            <span class="nav-emoji">📋</span> Historique
        </a>
        <a href="{{ url_for('components.reorder') }}"
           class="nav-link {% if request.endpoint == 'components.reorder' %}active{% endif %}">
            <span class="nav-emoji">🛒</span> Commandes
        </a>
        <a href="{{ url_for('components.rangement') }}"
           class="nav-link {% if request.endpoint == 'components.rangement' %}active{% endif %}">
            <span class="nav-emoji">📦</span> Rangement
        </a>
    </div>
    <div class="nav-right">
        <a href="{{ url_for('components.alerts') }}"
           class="nav-link {% if request.endpoint == 'components.alerts' %}active{% endif %}">
            <span class="nav-emoji">🔔</span>
            <span id="nav-alert-badge" class="nav-badge" style="display:none"></span>
        </a>
        <a href="{{ url_for('components.add') }}"
           class="btn btn-primary btn-sm {% if request.endpoint == 'components.add' %}active{% endif %}">
            ➕ Ajouter
        </a>
        <a href="{{ url_for('components.import_csv') }}"
           class="nav-link {% if request.endpoint == 'components.import_csv' %}active{% endif %}">
            <span class="nav-emoji">📥</span>
        </a>
        <a href="{{ url_for('components.settings') }}"
           class="nav-link {% if request.endpoint == 'components.settings' %}active{% endif %}">
            <span class="nav-emoji">⚙️</span>
        </a>
    </div>
</nav>

<main class="main-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
